<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident — City Metro Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>const API_BASE='https://ride-metro.felixfeger46.workers.dev'.replace(/\/+$/,'');</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Helvetica Neue,Helvetica,Arial,sans-serif;background:#f3f3f3;color:#1a1a1a;min-height:100vh}
  header{background:#0f172a;height:60px;display:flex;align-items:center;padding:0 20px;gap:12px}
  .hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .hdr-logo img{width:36px;height:36px;object-fit:contain;filter:invert(1)}
  .hdr-title{color:#fff;font-size:20px;font-weight:700}
  .back-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px}
  .back-link{font-size:14px;color:#3b82f6;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .back-link:hover{text-decoration:underline}
  .page{max-width:680px;margin:0 auto;padding:24px 16px 48px}
  .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
  .card-hdr{padding:16px 20px;border-bottom:1px solid #f3f3f3}
  .card-body{padding:20px}
  .level-bar{padding:14px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .level-bar.minor{background:#ca8a04}.level-bar.major{background:#ea580c}
  .level-bar.critical,.level-bar.emergency{background:#dc2626}
  .level-name{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .status-pill{background:rgba(255,255,255,.25);font-size:12px;font-weight:600;padding:3px 12px;border-radius:999px;text-transform:capitalize}
  .inc-title{font-size:22px;font-weight:700;margin-bottom:8px}
  .inc-desc{font-size:15px;color:#475569;line-height:1.7}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  .meta-item{}
  .meta-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;margin-bottom:3px}
  .meta-value{font-size:14px;font-weight:600;color:#1a1a1a}
  .line-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;color:#fff;margin:2px}
  .section-title{font-size:14px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
  .timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f3f3f3}
  .timeline-item:last-child{border-bottom:0}
  .tl-dot{width:10px;height:10px;border-radius:50%;background:#3b82f6;margin-top:4px;flex-shrink:0}
  .tl-time{font-size:11px;font-family:'JetBrains Mono',monospace;color:#94a3b8;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .tl-status-pill{font-size:11px;font-weight:600;padding:1px 8px;border-radius:999px;background:#f1f5f9;color:#64748b;flex-shrink:0}
  .tl-msg{font-size:14px;color:#334155;flex:1}
  .visit-btn{display:inline-block;background:#3b82f6;color:#fff;text-decoration:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;margin-top:12px}
  .loading{text-align:center;padding:60px;color:#94a3b8;font-size:15px}
  .error-box{background:#fee2e2;border-radius:12px;padding:24px;text-align:center;color:#dc2626}
</style>
</head>
<body>
<header>
  <a href="/" class="hdr-logo">
    <img src="https://alerts.citymetro.xyz/logo-white.png" alt="City Metro">
    <span class="hdr-title">Alerts</span>
  </a>
</header>
<div class="back-bar">
  <a href="index.html" class="back-link">‹ Back to Alerts</a>
</div>
<div class="page" id="page"><div class="loading">Loading incident…</div></div>
<script>
const $ = id => document.getElementById(id);
const id = new URLSearchParams(location.search).get('id');

function fmtTime(iso){
  if(!iso)return '—';
  return new Date(iso).toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short',timeZone:'America/Los_Angeles'});
}

async function load(){
  if(!id){$('page').innerHTML='<div class="error-box">No incident ID provided.</div>';return;}
  try{
    const [incidents,lines]=await Promise.all([
      fetch(`${API_BASE}/api/incidents`).then(r=>r.json()),
      fetch(`${API_BASE}/api/lines`).then(r=>r.json()),
    ]);
    const inc=incidents.find(i=>i.id===id);
    if(!inc){$('page').innerHTML='<div class="error-box">Incident not found.</div>';return;}
    document.title=`${inc.title} — City Metro Alerts`;
    const lineMap=Object.fromEntries((lines||[]).map(l=>[l.id,l]));
    const lineTags=(inc.affectedLines||[]).map(lid=>{
      const l=lineMap[lid];
      return l?`<span class="line-tag" style="background:${l.color}">${l.name}</span>`:`<span class="line-tag" style="background:#64748b">${lid}</span>`;
    }).join('');
    const updates=(inc.updates||[]).slice().reverse();
    $('page').innerHTML=`
      <div class="card">
        <div class="level-bar ${inc.level}">
          <span class="level-name">${inc.level} Incident</span>
          <span class="status-pill">${(inc.status||'').replace(/_/g,' ')}</span>
        </div>
        <div class="card-body">
          <div class="inc-title">${inc.title}</div>
          <div class="inc-desc">${inc.description||''}</div>
          <div class="meta-grid">
            <div class="meta-item"><div class="meta-label">Reported</div><div class="meta-value">${fmtTime(inc.createdAt)}</div></div>
            <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value">${fmtTime(inc.updatedAt)}</div></div>
            <div class="meta-item"><div class="meta-label">Affected Lines</div><div class="meta-value">${lineTags||'—'}</div></div>
            <div class="meta-item"><div class="meta-label">Affected Stations</div><div class="meta-value">${(inc.affectedWaypoints||[]).join(', ')||'—'}</div></div>
          </div>
        </div>
      </div>
      ${updates.length?`
      <div class="card">
        <div class="card-body">
          <div class="section-title">Update Timeline</div>
          ${updates.map(u=>`
            <div class="timeline-item">
              <div class="tl-dot"></div>
              <div class="tl-time">${fmtTime(u.timestamp)}</div>
              <span class="tl-status-pill">${(u.status||'').replace(/_/g,' ')}</span>
              <div class="tl-msg">${u.message}</div>
            </div>
          `).join('')}
        </div>
      </div>`:''}
      <a href="index.html" class="visit-btn">← Back to Status Page</a>
    `;
  }catch(e){$('page').innerHTML=`<div class="error-box">Failed to load: ${e.message}</div>`;}
}
load();
</script>
</body>
</html>
